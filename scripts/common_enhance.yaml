  #   action: 强化
  #   enhance_expression: *min_crit

  # ==============================================================================
  # 锁定标记
  # ==============================================================================

  - description: 锁定双爆副词条
    expression: |-
      星级 == 5
      && 等级 == 0
      && ((暴击率 && 暴击伤害) || (主:暴击率 && 暴击伤害) || (暴击率 && 主:暴击伤害))
    action: 仅锁定

  - description: 锁定双爆副词条得分(>=30)
    expression: |-
      星级 == 5
      && 暴击率 * 2 + 暴击伤害 >= 30
    action: 仅锁定

  - description: 标记双爆副词条得分(>=40)
    expression: |-
      星级 == 5
      && 暴击率 * 2 + 暴击伤害 >= 40
    action: 标记

  - description: 锁定双爆主词条得分(>=85)
    expression: |-
      理之冠
      && 星级 == 5
      && ((主:暴击伤害 + 暴击率 * 2) >= 85 || (主:暴击率 * 2 + 暴击伤害) >= 85)
    action: 仅锁定

  - description: 标记双爆主词条得分(>=95)
    expression: |-
      理之冠
      && 星级 == 5
      && ((主:暴击伤害 + 暴击率 * 2) >= 95 || (主:暴击率 * 2 + 暴击伤害) >= 95)
    action: 标记
