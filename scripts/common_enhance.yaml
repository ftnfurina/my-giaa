# Visual Studio Code 安装插件 `redhat.vscode-yaml` 即可验证、提示当前文件是否符合要求。
# yaml-language-server: $schema=https://raw.githubusercontent.com/ftnfurina/giaa/v0.13.0/schema/script.schema.json
l-language-server: $schema=https://raw.githubusercontent.com/ftnfurina/giaa/v0.8.1/schema/script.schema.json

name: 通用强化配置

description: 强化各种圣遗物

mode: 处理所有圣遗物

stop_star: 4

min_crit: &min_crit |-
  # 双爆副词条得分(>=30)
  (等级 >= 16 && 暴击率 * 2 + 暴击伤害 < 22.2)
  || (等级 >= 12 && 暴击率 * 2 + 暴击伤害 < 14.4)
  # 双爆主词条得分(>=85)
  || (等级 >= 16 && 主:暴击率 && 暴击伤害 < 15)
  || (等级 >= 12 && 主:暴击率 && 暴击伤害 < 7.2)
  || (等级 >= 16 && 主:暴击伤害 && 暴击率 * 2 < 15)
  || (等级 >= 12 && 主:暴击伤害 && 暴击率 * 2 < 7.2)

rules:
  - description: 重置标记或锁定状态
    expression: |-
      星级 == 5
    action: 取消标记

  # ==============================================================================
  # 强化
  # ==============================================================================

  - description: 纺月的夜歌
    expression: |-
      星级 == 5
      && 纺月的夜歌
      && (
        # 双爆副词条
        (
          暴击率 && 暴击伤害
          && (
            生之花
            || 死之羽
            || (时之沙 && (主:元素精通 || 主:元素充能效率 || 主:攻击力百分比))
            || (空之杯 && !主:防御力百分比)
            || (理之冠 && !主:防御力百分比 && !主:治疗加成)
          )
        )
        # 双爆主词条
        || (
          ((主:暴击率 && 暴击伤害) || (暴击率 && 主:暴击伤害))
          && 理之冠
        )
      )
    action: 强化
    enhance_expression: *min_crit

  - description: 穹境示现之夜 | 绝缘之旗印
    expression: |-
      星级 == 5
      && (穹境示现之夜 || 绝缘之旗印)
      && (
        # 双爆副词条
        (
          暴击率 && 暴击伤害
          && (
            生之花
            || 死之羽
            || (时之沙 && (主:元素精通 || 主:元素充能效率 || 主:攻击力百分比))
            || (空之杯 && !主:防御力百分比)
            || (理之冠 && !主:防御力百分比 && !主:治疗加成)
          )
        )
        # 双爆主词条
        || (
          ((主:暴击率 && 暴击伤害) || (暴击率 && 主:暴击伤害))
          && 理之冠
        )
      )
    action: 强化
    enhance_expression: *min_crit

  - description: 深廊终曲 || 长夜之誓
    expression: |-
      星级 == 5
      && (深廊终曲 || 长夜之誓)
      && (
        # 双爆副词条
