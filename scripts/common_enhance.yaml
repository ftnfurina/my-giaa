    enhance_expression: *min_crit

  - description: 流浪大地的乐团 | 角斗士的终幕礼
    expression: |-
      星级 == 5
      && (流浪大地的乐团 || 角斗士的终幕礼)
      && (
        # 双爆副词条
        (
