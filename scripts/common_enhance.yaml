          && (
            生之花
            || 死之羽
            || (时之沙 && (主:攻击力百分比 || 主:防御力百分比 || 主:元素精通 || 主:元素充能效率))
            || 空之杯
            || (理之冠 && (主:治疗加成 || 主:防御力百分比 || 主:攻击力百分比))
          )
        )
        # 双爆主词条
        || (
          ((主:暴击率 && 暴击伤害) || (暴击率 && 主:暴击伤害))
          && 理之冠
