          暴击率 && 暴击伤害
          && (
            生之花
            || 死之羽
            || (时之沙 && (主:生命值百分比 || 主:元素精通 || 主:元素充能效率))
            || (空之杯 && !主:防御力百分比)
            || (理之冠 && (主:元素精通 || 主:生命值百分比))
          )
        )
        # 双爆主词条
        || (
          ((主:暴击率 && 暴击伤害) || (暴击率 && 主:暴击伤害))
          && 理之冠
        )
      )
    action: 强化
    enhance_expression: *min_crit

  # - description: 其他双爆模板
  #   expression: |-
  #     星级 == 5
  #     && (
  #       # 双爆副词条
  #       (
  #         暴击率 && 暴击伤害
  #         && !理之冠
  #       )
