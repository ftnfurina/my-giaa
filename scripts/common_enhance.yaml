          暴击率 && 暴击伤害
          && (
            生之花
            || 死之羽
            || (时之沙 && 主:攻击力百分比)
            || (空之杯 && !主:防御力百分比)
          )
        )
        # 双爆主词条
        || (
          ((主:暴击率 && 暴击伤害) || (暴击率 && 主:暴击伤害))
          && 理之冠
        )
      )
    action: 强化
    enhance_expression: *min_crit

  - description: 黑曜秘典 | 逐影猎人
    expression: |-
      星级 == 5
      && (黑曜秘典 || 逐影猎人)
